<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - MultiBuy.Store</title>
  <!-- ── DELIGHT THEME ENGINE ── -->
  <script src="themeEngine.js"></script>
  <style>
    body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg, #f8f8f8);
  color: var(--text-dark, #1a1a2e);
  margin-top: 70px;
}

header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: var(--primary, linear-gradient(135deg, #ff6a00, #ff3d00));
  display: flex;
  align-items: center;
  justify-content: center;
  height: 65px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  border-bottom-left-radius: 35px;
  border-bottom-right-radius: 35px;
  z-index: 20;
}

.back-btn {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.2s ease;
}

.back-btn:hover { transform: translateY(-50%) scale(1.05); }
.back-btn img { width: 22px; height: 22px; }
header h4 {
  color: #fff;
  font-size: 21px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.25);
  margin: 0;
  text-align: center;
  line-height: 65px;
}
    /* Container */
    .container {
      padding: 20px;
    }

    /* Setting Option Card */
    .setting-option {
      background: var(--card-bg, white);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-option span {
      font-size: 15px;
      color: var(--text-dark, #333);
      font-weight: 500;
    }

    .setting-option button {
      padding: 7px 14px;
      border: none;
      background: var(--primary, linear-gradient(45deg, #ff8800, #ff5500));
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .setting-option button:active {
      transform: scale(0.96);
    }
  </style>

  <!-- ===== META PIXEL (Facebook) ===== -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window,document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  // Initialize Pixel
  fbq('init', 'YOUR_PIXEL_ID');

  // PageView - every page
  fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/>
  </noscript>
  <!-- ===== END META PIXEL ===== -->
</head>

<body>
<header>
  <div class="back-btn" onclick="history.back()">
    <img src="Store icons/Back.png" alt="Back">
  </div>
  <h4>Settings</h4>
</header>

<div class="container">

  <div class="setting-option">
    <span>Change Password</span>
    <button>Change</button>
  </div>

  <div class="setting-option">
    <span>Notification Settings</span>
    <button>Edit</button>
  </div>

  <div class="setting-option">
    <span>Privacy Policy</span>
    <button onclick="window.location.href='privacy.html'">View</button>
  </div>

  <div class="setting-option">
    <span>Terms & Conditions</span>
    <button onclick="window.location.href='terms.html'">View</button>
  </div>

  <div class="setting-option">
    <span>Logout</span>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
  function logout() {
    localStorage.removeItem("customer");
    window.location.href = "profile.html";
  }
  // Theme apply
 (function() {
    if (typeof DelightTheme !== "undefined") DelightTheme.apply("03202380355");
  })();
</script>

</body>
</html>
