<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MultiBuy.Store</title>

  <!-- ✅ themeEngine PEHLE — CSS inject karta hai BODY dikhne se pehle -->
  <script src="themeEngine.js"></script>

  <link rel="stylesheet" type="text/css" href="login.css">

  <!-- META PIXEL -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window,document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'YOUR_PIXEL_ID');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/></noscript>
</head>
<body>

  <div id="toastContainer"></div>

  <div class="delight">
    <h2>Welcome Back 👋</h2>
    <h2>TO</h2>
    <h1 id="welcomeTitle">Cucu Collection 🛍</h1>
  </div>

  <div class="store-info" id="storeInfo" style="margin-bottom:40px;">
    <img id="storeLogo" src="Store icons/Cucu.png" alt="Store Logo">
  </div>

  <div class="login">
    <h3>Login</h3>
    <form id="loginForm">
      <input type="number" id="phone" required placeholder="Enter your phone number" minlength="11" maxlength="11"><br>

      <div class="password-wrapper">
        <input type="password" id="pass" required placeholder="Enter your password" minlength="6">
        <span class="toggle-password" onclick="togglePassword()">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div><br>

      <button type="submit" class="submit-btn" id="loginBtn">
        <span class="btn-text">Login</span>
        <span class="btn-spinner" id="loginSpinner"></span>
      </button>
    </form>

    <p style="margin-top:12px; font-size:13px; text-align:center;">
      Don't have an account?
      <a href="Stores Signup.html" id="signupLink">✍️ Sign Up</a>
    </p>
  </div>

  <script>
    // ── CONFIG ──
    const STORE_CONFIG = { 
      name: "MultiBuy Store", 
      logo: "Store icons/MultiBuy-Store.png" };
    const ADMIN_PHONE  = "03202380355";

    // ── THEME APPLY (API se seller ka theme fetch hoga) ──
    DelightTheme.apply(ADMIN_PHONE);

    // ── TOAST ──
    function showToast(message, type = "error") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = "toast toast-" + type;
      const icons = { success: "✅", error: "⚠️", info: "ℹ️" };
      toast.innerHTML = `<span class="toast-icon">${icons[type]||"ℹ️"}</span><span class="toast-msg">${message}</span>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add("show"));
      setTimeout(() => { toast.classList.remove("show"); setTimeout(() => toast.remove(), 350); }, 3000);
    }

    // ── LOADING ──
    function setLoading(loading) {
      const btn     = document.getElementById("loginBtn");
      const spinner = document.getElementById("loginSpinner");
      btn.disabled  = loading;
      spinner.style.display = loading ? "inline-block" : "none";
    }

    // ── PASSWORD TOGGLE ──
    function togglePassword() {
      const passInput = document.getElementById("pass");
      const eyeIcon   = document.getElementById("eyeIcon");
      if (passInput.type === "password") {
        passInput.type = "text";
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>`;
      } else {
        passInput.type = "password";
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>`;
      }
    }

    // ── STORE INFO ──
    function loadStoreInfo() {
      document.getElementById("welcomeTitle").textContent = STORE_CONFIG.name + " 🛍";
      document.getElementById("storeLogo").src = STORE_CONFIG.logo;
    }

    // ── FORM SUBMIT ──
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const phone = document.getElementById("phone").value.trim();
      const pass  = document.getElementById("pass").value.trim();

      if (phone.length !== 11 || pass.length < 6) {
        showToast("Please enter valid phone and password!", "error"); return;
      }
      setLoading(true);
      try {
        const res  = await fetch("https://delight-backend--araindaniyalo2.replit.app/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, password: pass })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          localStorage.setItem("customer", JSON.stringify({ id: data.user.id, name: data.user.name, phone: data.user.phone }));
          showToast("Login successful! Redirecting...", "success");
          setTimeout(() => { window.location.href = "Profile Stores.html"; }, 1000);
        } else {
          showToast(data.message || "Login failed. Check credentials.", "error");
          setLoading(false);
        }
      } catch (err) {
        const local = JSON.parse(localStorage.getItem("customer"));
        if (local && local.phone === phone) {
          showToast("Login successful! Redirecting...", "success");
          setTimeout(() => { window.location.href = "Profile Stores.html"; }, 1000);
        } else {
          showToast("User not found locally. Please signup.", "error");
          setLoading(false);
        }
      }
    });

    document.addEventListener("DOMContentLoaded", loadStoreInfo);
  </script>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    document.addEventListener('click', function(e) {
      if (e.target.closest('#loginBtn') && typeof fbq !== 'undefined') {
        fbq('track', 'Lead', { content_name: 'Cucu Collection Login' });
      }
    });
  });
  </script>

</body>
</html>
