<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="login.css">
  <title>MultiBuy.Store - Login</title>
</head>
<body>

  <!-- 🔥 TOAST CONTAINER -->
  <div id="toastContainer"></div>

  <div class="delight">
    <h2>Welcome Back 👋</h2>
    <h2>TO</h2>
    <h1 id="welcomeTitle">MultiBuy Store🛍</h1>
  </div>

  <!-- 🔥 Store Logo Hardcoded -->
  <div class="store-info" id="storeInfo" style="margin-bottom:40px;">
    <img id="storeLogo" src="Store icons/MultiBuy-Store.png" alt="Store Logo">
  </div>

  <div class="login">
    <h3>Login</h3>

    <form id="loginForm">
      <input type="number" id="phone" required placeholder="Enter your phone number" minlength="11" maxlength="11"><br>
      
      <!-- 🔥 Password with Eye Toggle -->
      <div class="password-wrapper">
        <input type="password" id="pass" required placeholder="Enter your password" minlength="6">
        <span class="toggle-password" onclick="togglePassword()">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div><br>

      <button type="submit" class="submit-btn" id="loginBtn">
        <span class="btn-text">Login</span>
        <span class="btn-spinner" id="loginSpinner"></span>
      </button>
    </form>

    <p style="margin-top:12px; font-size:13px; text-align:center;">
      Don't have an account?
      <a href="Stores Signup.html" id="signupLink" style="color:#ef6c00; text-decoration:none; font-weight:bold;">✍️ Sign Up</a>
    </p>
  </div>

  <script>
    // 🔥 HARDCODED STORE CONFIG
    const STORE_CONFIG = {
      name: "MultiBuy Store",
      logo: "Store icons/MultiBuy-Store.png"
    };

    // ═══════════════════════════════
    // TOAST SYSTEM
    // ═══════════════════════════════
    function showToast(message, type = "error") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = "toast toast-" + type;
      const icons = { success: "✅", error: "⚠️", info: "ℹ️" };
      toast.innerHTML = `<span class="toast-icon">${icons[type] || "ℹ️"}</span><span class="toast-msg">${message}</span>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add("show"));
      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 350);
      }, 3000);
    }

    // ═══════════════════════════════
    // SPINNER HELPERS
    // ═══════════════════════════════
    function setLoading(loading) {
      const btn = document.getElementById("loginBtn");
      const spinner = document.getElementById("loginSpinner");
      btn.disabled = loading;
      spinner.style.display = loading ? "inline-block" : "none";
    }

    // 🔥 PASSWORD TOGGLE FUNCTION
    function togglePassword() {
      const passInput = document.getElementById("pass");
      const eyeIcon = document.getElementById("eyeIcon");
      if (passInput.type === "password") {
        passInput.type = "text";
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        passInput.type = "password";
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    }

    // 🔥 LOAD STORE INFO - Direct hardcoded
    function loadStoreInfo() {
      document.getElementById("welcomeTitle").textContent = STORE_CONFIG.name + "🛍";
      document.getElementById("storeLogo").src = STORE_CONFIG.logo;
    }

    // ═══════════════════════════════
    // FORM SUBMIT
    // ═══════════════════════════════
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const phone = document.getElementById("phone").value.trim();
      const pass = document.getElementById("pass").value.trim();

      if (phone.length !== 11 || pass.length < 6) {
        showToast("Please enter valid phone and password!", "error");
        return;
      }

      setLoading(true);

      try {
        const baseUrl = "https://delight-backend--araindaniyalo2.replit.app";
        const res = await fetch(baseUrl + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, password: pass })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem("customer", JSON.stringify({
            id: data.user.id,
            name: data.user.name,
            phone: data.user.phone
          }));
          showToast("Login successful! Redirecting...", "success");
          setTimeout(() => { window.location.href = "Profile Stores.html"; }, 1000);
        } else {
          showToast(data.message || "Login failed. Check credentials.", "error");
          setLoading(false);
        }
      } catch (err) {
        console.warn("⚠️ Backend offline → Using localStorage fallback");
        const local = JSON.parse(localStorage.getItem("customer"));
        if (local && local.phone === phone) {
          showToast("Login successful! Redirecting...", "success");
          setTimeout(() => { window.location.href = "Profile Stores.html"; }, 1000);
        } else {
          showToast("User not found locally. Please signup.", "error");
          setLoading(false);
        }
      }
    });

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      loadStoreInfo();
    });
  </script>

</body>
</html>
