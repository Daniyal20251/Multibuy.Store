<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Categories - MultiBuy.Store</title>
  <link rel="stylesheet" href="Store.css">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script src="themeEngine.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════
       CATEGORY RESULTS PAGE — themeEngine.js Compatible
       ═══════════════════════════════════════════════════════════ */

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg, #f8f8f8);
      color: var(--text-dark, #1a1a2e);
      min-height: 100vh;
      padding-bottom: 20px;
      -webkit-overflow-scrolling: touch;
    }

    /* Header — themeEngine overrides via "header" selector */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #ff6a00, #ff3d00);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 65px;
      box-shadow: 0 3px 10px var(--accent-shadow, rgba(0,0,0,0.15));
      border-bottom-left-radius: 35px;
      border-bottom-right-radius: 35px;
      z-index: 20;
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.2s ease;
    }
    .back-btn:hover {
      transform: translateY(-50%) scale(1.05);
    }
    .back-btn img {
      width: 22px;
      height: 22px;
    }

    /* Category Title */
    header h4 {
      color: #fff;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
      margin: 0;
      text-align: center;
      line-height: 65px;
    }

    /* Container */
    .container {
      margin-top: 80px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ═══════════════════════════════════════════════════════════
       SKELETON LOADING — Matching Store.css style
       ═══════════════════════════════════════════════════════════ */
    .skeleton-container {
      margin-top: 80px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .skeleton-card {
      background: var(--card-bg, white);
      border-radius: 10px;
      overflow: hidden;
      height: 230px;
      display: flex;
      flex-direction: column;
      border: 1.5px solid var(--border, #e8e8f0);
    }

    .skeleton-card .skeleton-img {
      width: 100%;
      height: 145px;
      background: linear-gradient(90deg, var(--skeleton-base, #f0f0f0) 25%, var(--skeleton-shine, #e4e4e4) 50%, var(--skeleton-base, #f0f0f0) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .skeleton-card .skeleton-title {
      width: 80%;
      height: 13px;
      border-radius: 6px;
      margin: 10px 10px 0;
      background: linear-gradient(90deg, var(--skeleton-base, #f0f0f0) 25%, var(--skeleton-shine, #e4e4e4) 50%, var(--skeleton-base, #f0f0f0) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .skeleton-card .skeleton-price {
      width: 45%;
      height: 16px;
      border-radius: 6px;
      margin: 8px 10px 0;
      background: linear-gradient(90deg, var(--skeleton-base, #f0f0f0) 25%, var(--skeleton-shine, #e4e4e4) 50%, var(--skeleton-base, #f0f0f0) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-container.hidden { display: none !important; }

    /* ═══════════════════════════════════════════════════════════
       NOT FOUND / EMPTY STATE
       ═══════════════════════════════════════════════════════════ */
    .not-found {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 20px;
    }
    .not-found img {
      width: 180px;
      opacity: 0.8;
      margin-bottom: 14px;
    }
    .not-found h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary, #ff6b00);
      margin-bottom: 6px;
    }
    .not-found p {
      color: var(--text-mid, #555577);
      font-size: 14px;
    }

    /* Loading text */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-mid, #666);
      font-weight: 500;
      z-index: 10;
      display: none;
    }
  </style>

  <!-- ===== META PIXEL (Facebook) ===== -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window,document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  fbq('init', 'YOUR_PIXEL_ID');
  fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/>
  </noscript>
  <!-- ===== END META PIXEL ===== -->
</head>  
<body>  

  <!-- Top Header -->  
  <header>  
    <div class="back-btn" onclick="history.back()">  
      <img src="Store icons/Back.png" alt="Back">  
    </div>  
    <h4 id="categoryTitle">Category</h4>  
  </header>  

  <!-- SKELETON LOADING -->
  <div id="skeletonContainer" class="skeleton-container">
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
    <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-price"></div></div>
  </div>

  <!-- Product Container -->  
  <div class="container" id="itemContainer" style="display:none;"></div>  

  <!-- Loading -->  
  <div id="loading">Loading...</div>  

  <script>
    const STORE_CONFIG = {
      phone: "03202380355",
      name: "MultiBuy Store",
      logo: "Store icons/MultiBuy-Store.png"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get("category");

    const displayTitle = category && category.includes(" - ") 
      ? category.split(" - ").pop().trim() 
      : (category || "Category");
    document.getElementById("categoryTitle").textContent = displayTitle;

    async function loadCategoryProducts() {
      const container = document.getElementById("itemContainer");
      const skeletonContainer = document.getElementById("skeletonContainer");
      const loading = document.getElementById("loading");

      if (!category) {
        skeletonContainer.style.display = "none";
        loading.textContent = "Missing category!";
        loading.style.color = "var(--primary, #ff6b00)";
        loading.style.fontWeight = "700";
        loading.style.display = "block";
        return;
      }

      try {
        const res = await fetch("https://delight-backend--araindaniyalo2.replit.app/products");
        const allProducts = await res.json();

        const filtered = allProducts.filter(p => {
          const productCategory = (p.category || "").toLowerCase();
          const searchCategory = category.toLowerCase().trim();
          const matchCategory = productCategory.includes(searchCategory);
          const matchStore = p.sellerPhone === STORE_CONFIG.phone;
          return matchCategory && matchStore;
        });

        skeletonContainer.style.display = "none";
        container.style.display = "grid";
        loading.style.display = "none";

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="not-found">
              <img src="Store icons/not-found.png" alt="No Results">
              <h3>Oops! No Items Found</h3>
              <p>No products in this category for this store.</p>
            </div>`;
          return;
        }

        filtered.forEach((item, index) => {
          const card = document.createElement("div");
          card.className = "item-card";
          card.style.animationDelay = `${(index % 10) * 40}ms`;

          const basePrice = parseInt(item.price?.toString().replace(/[^\d]/g, "")) || 0;
          const discount = parseInt(item.discount?.toString().replace(/[^\d]/g, "")) || 0;
          const finalPrice = Math.max(basePrice - discount, 0);
          const img = item.images?.[0] || item.image || 'https://via.placeholder.com/150';

          card.innerHTML = `
            <div class="card-img-wrap">
              <img src="${img}" alt="${item.title || ''}" loading="lazy">
            </div>
            <div class="card-body">
              <h3>${item.title || ''}</h3>
              <p class="price-wrapper">
                <span class="new-price"><span class="rs">Rs.</span><strong>${finalPrice}</strong></span>
                ${discount > 0 ? `<span class="old-price-inline">Rs. ${basePrice}</span>` : ''}
              </p>
            </div>
          `;

          card.addEventListener("click", () => {
            const updatedItem = { ...item, finalPrice, originalPrice: basePrice };
            localStorage.setItem("selectedItem", JSON.stringify(updatedItem));
            window.location.href = "Stores itemDetails.html";
          });

          container.appendChild(card);
        });

        setupScrollReveal();

      } catch (err) {
        console.error("Error:", err);
        skeletonContainer.style.display = "none";
        loading.textContent = "Error loading products! Check internet.";
        loading.style.color = "var(--primary, #ff6b00)";
        loading.style.display = "block";
      }
    }

    function setupScrollReveal() {
      const cards = document.querySelectorAll('.item-card');
      if (!('IntersectionObserver' in window)) {
        cards.forEach(c => c.classList.add('visible'));
        return;
      }
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });
      cards.forEach(c => observer.observe(c));
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadCategoryProducts();

      // ── THEME: Apply seller's selected theme ──
      if (typeof DelightTheme !== "undefined") {
        DelightTheme.apply(STORE_CONFIG.phone);
      }
    });
  </script>  

  <!-- META PIXEL: Search -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var urlParams = new URLSearchParams(window.location.search);
    var searchQuery = urlParams.get('q') || urlParams.get('search') || urlParams.get('category') || '';
    fbq('track', 'Search', {
      search_string: searchQuery,
      content_category: 'Category'
    });
  });
  </script>

</body>  
</html>
