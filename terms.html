<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <itle>Terms & Conditions - MultiBuy.Store</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; margin-top:50px;}
    h1 { color: #ff6c00; }
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 65px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  border-bottom-left-radius: 35px;
  border-bottom-right-radius: 35px;
  z-index: 20;
}

.back-btn {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.2s ease;
}

.back-btn:hover { transform: translateY(-50%) scale(1.05); }
.back-btn img { width: 22px; height: 22px; }
header h4 {
  color: #fff;
  font-size: 21px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.25);
  margin: 0;
  text-align: center;
  line-height: 65px;
}
  </style>
</head>
<body>
  <header>
  <div class="back-btn" onclick="history.back()">
    <img src="Store icons/Back.png" alt="Back">
  </div>
  <h4>Terms & Conditions</h4>
</header>
  <h1>Terms & Conditions</h1>
  <p>By using MultiBuy.Store, you agree to our terms. All products are sold as per availability. Prices may change without prior notice. Orders are processed only after payment confirmation.</p>
</body>
</html>
