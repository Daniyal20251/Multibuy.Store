<style>
  /* ── Header fix ── */
  .main-header {
    max-width: 480px;
    left: 50%;
    transform: translateX(-50%);
    right: auto;
    width: 100%;
  }

  /* ── Sidebar item with image+label ── */
  .sidebar-item span {
    display: block;
    font-size: 9.5px;
    font-weight: 700;
    line-height: 1.2;
    color: inherit;
  }

  /* ── Category section heading ── */
  .content h2 {
    font-size: 14px;
  }

  /* ── Sub item badge on hover ── */
  .sub-item {
    position: relative;
    overflow: hidden;
  }
  .sub-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,107,0,0.07), transparent);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 12px;
  }
  .sub-item:hover::after { opacity: 1; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
  }
  .empty-state svg {
    width: 64px; height: 64px;
    opacity: 0.3;
    margin-bottom: 12px;
  }
  .empty-state p {
    font-size: 13px;
    font-weight: 700;
  }

  /* ── Page fade-in ── */
  .content { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── Sub-grid stagger ── */
  .sub-item {
    animation: popIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── Bottom bar fix for centered layout ── */
  .bar {
    max-width: 440px;
  }

  /* ── Active sidebar indicator dot ── */
  .sidebar-item.active::after {
    content: '';
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 24px;
    background: var(--primary);
    border-radius: 3px 0 0 3px;
  }
  .sidebar-item { position: relative; }


</style>
</head>

const sellerPhone = STORE_CONFIG.phone;

function loadStoreInfo() {
  document.getElementById("storeName").textContent = STORE_CONFIG.name;
  document.getElementById("storeLogo").src = STORE_CONFIG.logo;
}

function showSubcategories(catName) {
  const area = document.getElementById('contentArea');
  const subs = categories[catName] || [];
  area.innerHTML = `
    <h2>${catName}</h2>
    <div class="sub-grid">
      ${subs.map((sub, i) => `
        <div class="sub-item" data-value="${catName} - ${sub}" style="animation-delay:${i * 40}ms">
          <img src="${subcategoryIcons[sub] || 'Category icons/default.png'}" alt="${sub}" onerror="this.src='Category icons/other.png'">
          <span>${sub}</span>
        </div>
      `).join("")}
    </div>
  `;

  document.querySelectorAll('.sub-item').forEach(el => {
    el.addEventListener('click', () => {
      const selectedCategory = el.dataset.value;
      window.location.href = `Category Results Stores.html?category=${encodeURIComponent(selectedCategory)}`;
    });
  });
}

document.querySelectorAll('.sidebar-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    showSubcategories(btn.dataset.cat);
    // Scroll sidebar item into view
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
});

document.addEventListener("DOMContentLoaded", () => {
  loadStoreInfo();
  showSubcategories("Men Fashion");
});
