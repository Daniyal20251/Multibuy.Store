<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="Cart.css">
<title>Your Cart - MultiBuy.Store</title>

  <!-- ===== META PIXEL (Facebook) ===== -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window,document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'YOUR_PIXEL_ID');
  fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/>
  </noscript>
  <!-- ===== END META PIXEL ===== -->
</head>
<body>

<!-- ====== HEADER ====== -->
<header class="cart-header">
  <h2>Your Cart</h2>
  <p>Review your items before checkout</p>
</header>

<!-- ====== SCROLLABLE CONTENT WRAPPER ====== -->
<div class="cart-scroll-wrapper">
  <div id="cartContainer"></div>
  <div class="total" id="totalPrice">Total: Rs. 0</div>
  <button class="buy-all-btn buy-btn" id="buyBtn" onclick="goToOrderPage()">Buy All</button>
  <button class="continue-btn buy-btn" id="continueBtn" style="display:none;" onclick="goHome()">Continue Shopping</button>
</div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bar">
    <a href="index.html" id="homeLink">
      <img src="Store icons/Home.png" width="22" height="22" alt="Home">
      <span>Home</span>
    </a>
    <a href="Categories Stores.html" id="categoriesLink">
      <img src="Store icons/Categories.png" width="22" height="22" alt="Categories">
      <span>Categories</span>
    </a>
    <a href="Cart Stores.html" class="active" id="cartLink">
      <img src="Store icons/Cart.png" width="22" height="22" alt="Cart">
      <span>Cart</span>
    </a>
    <a href="Profile Stores.html" id="profileLink">
      <img src="Store icons/Profile.png" width="22" height="22" alt="Profile">
      <span>Profile</span>
    </a>
  </nav>

<script>
const STORE_CONFIG = {
  phone: "03202380355",
  name: "MultiBuy Store",
  logo: "Store icons/MultiBuy-Store.png"
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartContainer = document.getElementById('cartContainer');
const totalPriceEl = document.getElementById('totalPrice');
const buyBtn = document.getElementById('buyBtn');
const continueBtn = document.getElementById('continueBtn');

function renderCart() {
  cartContainer.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    cartContainer.innerHTML = `
      <div class="empty-cart-container">
        <img src="Store icons/ShoppingTrolly.png" alt="Empty Cart" class="empty-cart-icon">
        <div class="empty-cart-title">Your Cart is Empty</div>
        <div class="empty-cart-subtitle">Looks like you haven't added<br>anything to your cart yet.</div>
      </div>
    `;
    totalPriceEl.textContent = "";
    buyBtn.style.display = "none";
    continueBtn.style.display = "block";
    return;
  }

  cart.forEach((item, index) => {
    const price = Number(item.price);
    const qty = item.quantity;
    const subTotal = price * qty;

    total += subTotal;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${item.image}" alt="${item.title}" />
      <div class="cart-item-info">
        <div class="cart-item-title">${item.title}</div>

        <div class="cart-item-price">
          Rs. ${price} × ${qty} <br>
          <strong>Total: Rs. ${subTotal}</strong>
        </div>

        <div class="quantity-controls">
          <button class="qty-btn" onclick="decreaseQty(${index})">−</button>
          <span>${qty}</span>
          <button class="qty-btn" onclick="increaseQty(${index})">+</button>
        </div>
      </div>

      <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
    `;
    cartContainer.appendChild(div);
  });

  totalPriceEl.textContent = "Total: Rs. " + total;
  buyBtn.style.display = "block";
  continueBtn.style.display = "none";
}

function increaseQty(index) {
  cart[index].quantity += 1;
  updateCart();
}

function decreaseQty(index) {
  if (cart[index].quantity > 1) {
    cart[index].quantity -= 1;
  } else {
    cart.splice(index, 1);
  }
  updateCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

function updateCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function goToOrderPage() {
  localStorage.setItem("orderCartItems", JSON.stringify(cart));
  window.location.href = "Stores Cart Orders.html";
}

function goHome() {
  window.location.href = "index.html";
}

renderCart();

// ── THEME: Apply seller's selected theme ──
if (typeof DelightTheme !== "undefined") {
  DelightTheme.apply(STORE_CONFIG.phone);
}
</script>


  <!-- META PIXEL: AddToCart + InitiateCheckout -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    fbq('track', 'AddToCart', {
      content_type: 'product',
      currency: 'PKR'
    });

    document.addEventListener('click', function(e) {
      if (e.target.closest('#buyBtn, .buy-all-btn, [onclick*="goToOrderPage"], [onclick*="checkout"]')) {
        var totalEl = document.querySelector('#totalPrice, .total, [class*="total"]');
        var total = 0;
        if (totalEl) {
          var t = totalEl.innerText.replace(/[^0-9.]/g, '');
          total = parseFloat(t) || 0;
        }
        fbq('track', 'InitiateCheckout', {
          content_type: 'product',
          currency: 'PKR',
          value: total
        });
      }
    });
  });
  </script>

</body>
</html>
