<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Theme Engine: CSS se pehle load hona zaroori hai (no flash) -->
  <script src="themeEngine.js?v=5"></script>
  <link rel="stylesheet" href="Delight Chat.css?v=5">
  <title>Delight Chat - MultiBuy.Store</title>

  <!-- ===== META PIXEL (Facebook) ===== -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window,document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  // Initialize Pixel
  fbq('init', 'YOUR_PIXEL_ID');

  // PageView - every page
  fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/>
  </noscript>
  <!-- ===== END META PIXEL ===== -->
</head>
<body>

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <button class="chat-back-btn" onclick="goBack()">&#10094;</button>
      <img src="lo.png" id="chatSellerLogo" class="chat-seller-logo" onerror="this.src='lo.png'">
      <div class="chat-seller-text">
        <span class="chat-seller-name" id="chatSellerName">Loading...</span>
        <span class="chat-seller-status" id="chatSellerStatus">Online</span>
      </div>
    </div>
    <button class="chat-whatsapp-btn" onclick="chatOnWhatsApp()" title="Chat on WhatsApp">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </button>
  </div>

  <!-- Product Info Bar -->
  <div class="chat-product-bar" id="chatProductBar" style="display:none;">
    <img src="" id="chatProductImg" class="chat-product-img" onerror="this.src='noimg.png'">
    <div class="chat-product-details">
      <span class="chat-product-title" id="chatProductTitle"></span>
      <span class="chat-product-price" id="chatProductPrice"></span>
    </div>
    <button class="chat-view-product-btn" onclick="viewProduct()">View</button>
  </div>

  <!-- Messages Area -->
  <div class="chat-messages" id="chatMessages">
    <div class="chat-welcome" id="chatWelcome">
      <div class="chat-welcome-icon">&#128172;</div>
      <h3>Start a Conversation</h3>
      <p>Ask the seller about this product. Share photos and get quick replies.</p>
    </div>
  </div>

  <!-- Typing Indicator -->
  <div class="chat-typing" id="chatTyping" style="display:none;">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span>typing...</span>
  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <button class="chat-attach-btn" onclick="toggleAttachMenu()">&#128206;</button>
    <div class="chat-input-wrapper">
      <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
    <input type="file" id="chatPhotoInput" accept="image/*" multiple style="display:none;" onchange="handleChatPhotos(this)">
  </div>

  <!-- Attach Menu -->
  <div class="chat-attach-menu" id="chatAttachMenu" style="display:none;">
    <div class="attach-option" onclick="openPhotoPicker()">
      <span>&#128247;</span>
      <span>Photo</span>
    </div>
    <div class="attach-option" onclick="shareProduct()">
      <span>&#128230;</span>
      <span>Product</span>
    </div>
    <div class="attach-option" onclick="chatOnWhatsApp()">
      <span>&#128242;</span>
      <span>WhatsApp</span>
    </div>
  </div>

  <!-- Login Prompt Modal -->
  <div class="chat-login-modal" id="chatLoginModal" style="display:none;">
    <div class="chat-login-overlay" onclick="closeLoginModal()"></div>
    <div class="chat-login-sheet">
      <div class="chat-login-icon">&#128274;</div>
      <h3>Login Required</h3>
      <p>Please login to chat with the seller</p>
      <button class="chat-login-btn" onclick="goToLogin()">Login Now</button>
      <button class="chat-login-cancel" onclick="closeLoginModal()">Cancel</button>
    </div>
  </div>

  <!-- Image Preview Modal -->
  <div class="chat-image-modal" id="chatImageModal" style="display:none;" onclick="closeImageModal()">
    <img src="" id="chatImageModalImg" onclick="event.stopPropagation()">
    <button class="chat-image-close" onclick="closeImageModal()">&#10005;</button>
  </div>

  <script src="Delight Chat.js?v=4"></script>
</body>
</html>
